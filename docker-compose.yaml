services:
  api:
    build:
      context: ./api/
      target: dev
    container_name: feedbacktracker-api
    env_file:
      - .env
    volumes:
      - ./api:/app
      - ~/.m2:/root/.m2
    depends_on:
      - db
    ports:
      - "8080:8080"
  db:
    image: postgres:latest
    restart: always
    container_name: feedbacktracker-db
    ports:
      - "5433:5432"
    volumes:
      - db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  db:
